<!DOCTYPE html>
<html>
<head>
<title>RKP Bot FIXED 😏🔥</title>
<style>
body { font-family:sans-serif; padding:15px; }
#log { background:#111; color:#0f0; height:200px; overflow:auto; padding:10px; }
</style>
</head>

<body>

<h2>🎵 RKP Bot (Fixed)</h2>

<input type="file" id="files" multiple accept=".mp3">
<p id="status"></p>

<input type="text" id="imgInput" placeholder="Paste Image URL">

<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<script>

let files = [];
let index = 0;
let images = [];
let logs = [];
let zip = new JSZip();

function log(msg){
  logs.push(msg);
  document.getElementById("log").innerHTML = logs.join("<br>");
  saveCache();
}

function saveCache(){
  localStorage.setItem("rkp_cache", JSON.stringify({
    index,
    images,
    logs,
    time: Date.now()
  }));
}

function loadCache(){
  let data = JSON.parse(localStorage.getItem("rkp_cache"));
  if(!data) return;

  if(Date.now() - data.time > 7*24*60*60*1000){
    localStorage.removeItem("rkp_cache");
    return;
  }

  index = data.index || 0;
  images = data.images || [];
  logs = data.logs || [];

  document.getElementById("log").innerHTML = logs.join("<br>");
  log("♻️ Restored");

}

loadCache();

document.getElementById("files").onchange = (e)=>{
  files = Array.from(e.target.files);
  index = 0;
  images = [];
  logs = [];
  nextFile();
};

function cleanName(n){
  return n.replace(/\.[^/.]+$/, "");
}

function nextFile(){

  if(index >= files.length){
    log("📦 Creating ZIP...");

    images.forEach(img=>{
      zip.file(img.name, img.blob);
    });

    zip.generateAsync({type:"blob"}).then(content=>{
      let a=document.createElement("a");
      a.href=URL.createObjectURL(content);
      a.download="covers.zip";
      a.click();
      log("🎉 DONE");
    });

    return;
  }

  let name = cleanName(files[index].name);

  document.getElementById("status").innerText =
    `Processing ${index+1}/${files.length} → ${name}`;

  log("🔍 " + name);

  setTimeout(()=>{
    window.location.href =
      "https://www.google.com/search?tbm=isch&q=" +
      encodeURIComponent(name + " official cover");
  },500);
}

// 🔥 PASTE FIX
document.getElementById("imgInput").addEventListener("paste", (e)=>{
  setTimeout(()=> processImage(), 200);
});

async function processImage(){

  let url = document.getElementById("imgInput").value.trim();

  if(!url){
    log("❌ Empty URL");
    return;
  }

  let name = cleanName(files[index].name);

  try{

    let finalURL = url;

    if(url.includes("imgres")){
      let u = new URL(url);
      finalURL = decodeURIComponent(u.searchParams.get("imgurl"));
    }

    let blob;

    if(finalURL.startsWith("data:image")){

      let arr = finalURL.split(',');
      let mime = arr[0].match(/:(.*?);/)[1];
      let bstr = atob(arr[1]);
      let u8arr = new Uint8Array(bstr.length);

      for(let i=0;i<bstr.length;i++){
        u8arr[i] = bstr.charCodeAt(i);
      }

      blob = new Blob([u8arr], {type:mime});

    }else{

      let res = await fetch(finalURL);
      blob = await res.blob();

      if(blob.size < 1000) throw "Invalid";
    }

    let ext = blob.type.split("/")[1] || "jpg";

    images.push({name: name+"."+ext, blob});

    log("✅ Saved: " + name);

    document.getElementById("imgInput").value = "";

    index++;
    saveCache();

    setTimeout(nextFile, 500);

  }catch(e){
    log("❌ Failed → retry");
  }

}

</script>

</body>
</html>
